
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YON3 | TECH GEEK Portfolio</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#191724">
    <link rel="icon" href="/yon-logo-black.png" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" href="/yon-logo-black.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/yon-logo-black.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Inter"', 'sans-serif'],
            },
            colors: {
              rose: {
                base: '#191724',
                surface: '#1f1d2e',
                overlay: '#26233a',
                muted: '#6e6a86',
                subtle: '#908caa',
                text: '#e0def4',
                love: '#eb6f92',
                gold: '#f6c177',
                rose: '#ebbcba',
                pine: '#31748f',
                foam: '#9ccfd8',
                iris: '#c4a7e7',
                // Dawn (Light mode) equivalents
                'dawn-base': '#faf4ed',
                'dawn-surface': '#fffaf3',
                'dawn-overlay': '#f2e9e1',
                'dawn-muted': '#9893a5',
                'dawn-subtle': '#797593',
                'dawn-text': '#575279',
              },
              nobel: {
                gold: '#f6c177', // Map old gold to Rose Pine Gold
                dark: '#191724', // Map old dark to Rose Pine Base
                cream: '#faf4ed', // Map old cream to Rose Pine Dawn Base
              }
            }
          }
        }
      }
    </script>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('theme');
          const theme = saved === 'light' ? 'light' : 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px;
      }
      /* Remove forced body styles that override Tailwind's dark mode */
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      @media print {
        nav, footer, button {
          display: none !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@react-three/fiber": "https://aistudiocdn.com/@react-three/fiber@^9.4.0",
    "@react-three/drei": "https://aistudiocdn.com/@react-three/drei@^10.7.7",
    "three": "https://aistudiocdn.com/three@^0.181.1",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
